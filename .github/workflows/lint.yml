name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Check Formatting (Ruff)
      run: ruff format --check synth_dynamics/ tests/

    - name: Lint (Ruff)
      run: ruff check synth_dynamics/ tests/

    - name: Type Check (Mypy)
      run: mypy synth_dynamics/
